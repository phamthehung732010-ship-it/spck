<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập & Đăng ký</title>

<style>
  body{
    font-family: Arial;

    background-image: url("https://cdn.tgdd.vn//GameApp/1272596//web-xem-phim-1-800x420.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box{
    background: #ffffff;
    padding: 25px;
    width: 320px;
    border-radius: 10px;
    text-align: center;
    color: black;
  }

  input{
    width: 90%;
    padding: 10px;
    margin: 10px;
    background: #c4c4c4;
    border: none;
    border-radius: 5px;
    color: black;
  }

  input::placeholder{
    color: black;
  }

  button{
    width: 95%;
    padding: 10px;
    background: #87CEEB;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover{
    background: #000080;
  }

  #message{
    margin-top: 10px;
    font-weight: bold;
  }

  .hidden{
    display: none;
  }

  a{
    color: blue;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="box">

  <!-- ĐĂNG NHẬP -->
  <div id="loginForm">

    <h2>Đăng nhập</h2>

    <input type="text" id="loginUser" placeholder="Username">

    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>Chưa có tài khoản?
      <a onclick="showRegister()">Đăng ký</a>
    </p>

  </div>

  <!-- ĐĂNG KÝ -->
  <div id="registerForm" class="hidden">

    <h2>Đăng ký</h2>

    <input type="text" id="registerUser" placeholder="Username">

    <input type="password" id="registerPass" placeholder="Password">

    <button onclick="register()">Register</button>

    <p>Đã có tài khoản?
      <a onclick="showLogin()">Đăng nhập</a>
    </p>

  </div>

  <div id="message"></div>

</div>

<script>

// Hiện form đăng ký
function showRegister(){
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
  document.getElementById("message").innerHTML = "";
}

// Hiện form đăng nhập
function showLogin(){
  document.getElementById("registerForm").classList.add("hidden");
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("message").innerHTML = "";
}

// ĐĂNG KÝ
function register(){

  let user = document.getElementById("registerUser").value.trim();
  let pass = document.getElementById("registerPass").value.trim();

  let message = document.getElementById("message");

  if(user === "" || pass === ""){
    message.innerHTML = "Vui lòng nhập đầy đủ!";
    message.style.color = "red";
    return;
  }

  // Tạo object JSON
  let account = {
    username: user,
    password: pass
  };

  // Lưu LocalStorage dạng JSON
  localStorage.setItem("account", JSON.stringify(account));

  message.innerHTML = "Đăng ký thành công!";
  message.style.color = "green";

  // Xóa input
  document.getElementById("registerUser").value = "";
  document.getElementById("registerPass").value = "";
}

// ĐĂNG NHẬP
function login(){

  let user = document.getElementById("loginUser").value.trim();
  let pass = document.getElementById("loginPass").value.trim();

  let message = document.getElementById("message");

  // Lấy dữ liệu JSON từ LocalStorage
  let data = localStorage.getItem("account");

  // Kiểm tra có tài khoản chưa
  if(data === null){
    message.innerHTML = "Chưa có tài khoản!";
    message.style.color = "red";
    return;
  }

  // Chuyển JSON thành object
  let account = JSON.parse(data);

  // Kiểm tra đăng nhập
  if(user === account.username && pass === account.password){

    message.innerHTML = "Đăng nhập thành công!";
    message.style.color = "green";

  }else{

    message.innerHTML = "Sai tài khoản hoặc mật khẩu!";
    message.style.color = "red";

  }
}

</script>

</body>
</html>
